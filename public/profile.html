<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - SmartSpend</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Icons & Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col font-sans transition-colors duration-300">

  <!-- Navbar -->
  <nav class="glass-panel border-b border-slate-200/50 dark:border-slate-800/30 px-6 py-4 flex items-center justify-between">
    <a href="dashboard.html" class="flex items-center space-x-3">
      <div class="bg-indigo-600 text-white w-9 h-9 rounded-xl flex items-center justify-center shadow-lg">
        <i class="fas fa-wallet"></i>
      </div>
      <span class="text-lg font-bold bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent dark:from-indigo-400 dark:to-violet-300">
        SmartSpend
      </span>
    </a>
    
    <div class="flex items-center space-x-4">
      <button class="theme-toggle-btn w-9 h-9 rounded-xl flex items-center justify-center bg-slate-100 hover:bg-slate-200 dark:bg-slate-900 dark:hover:bg-slate-800 transition">
        <i class="fas fa-moon"></i>
      </button>
      
      <a href="dashboard.html" class="text-sm font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">
        <i class="fas fa-chart-line mr-1.5"></i>Dashboard
      </a>
    </div>
  </nav>

  <!-- Profile Content -->
  <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-8 sm:py-12 fade-in">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-6 mb-8 pb-6 border-b border-slate-200/50 dark:border-slate-800/50">
      <div class="w-20 h-20 rounded-2xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center text-white text-3xl font-extrabold shadow-lg" id="userInitials">
        U
      </div>
      <div class="text-center sm:text-left">
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white" id="profileUsername">User Name</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Manage your budget limits and account settings</p>
      </div>
    </div>

    <!-- Forms Layout Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      
      <!-- Account Details & Budget -->
      <div class="glass-panel p-6 sm:p-8 rounded-2xl border border-slate-200/50 dark:border-slate-800/30">
        <h3 class="text-lg font-bold text-slate-950 dark:text-white mb-6 flex items-center">
          <i class="fas fa-user-circle text-indigo-600 dark:text-violet-400 mr-2.5"></i>
          Account Details & Settings
        </h3>

        <form id="profileForm" class="space-y-5">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Username</label>
            <input 
              type="text" 
              id="usernameInput" 
              class="block w-full px-3 py-2.5 text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600 dark:focus:ring-violet-500 text-slate-900 dark:text-white transition"
              required
            >
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Email Address</label>
            <input 
              type="email" 
              id="emailInput" 
              class="block w-full px-3 py-2.5 text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600 dark:focus:ring-violet-500 text-slate-900 dark:text-white transition"
              required
            >
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Monthly Budget Limit (INR)</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 text-sm font-medium">₹</span>
              <input 
                type="number" 
                id="budgetInput" 
                class="block w-full pl-7 pr-3 py-2.5 text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600 dark:focus:ring-violet-500 text-slate-900 dark:text-white transition"
                min="0"
                placeholder="0 (unlimited)"
              >
            </div>
            <p class="text-xs text-slate-400 mt-1">Receive warning alerts if current-month expenses exceed this value.</p>
          </div>

          <button 
            type="submit" 
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl text-sm font-semibold shadow-lg shadow-indigo-600/20 transition-all flex items-center justify-center hover:scale-[1.01]"
          >
            <i class="fas fa-save mr-2"></i>Save Changes
          </button>
        </form>
      </div>

      <!-- Password Change -->
      <div class="glass-panel p-6 sm:p-8 rounded-2xl border border-slate-200/50 dark:border-slate-800/30">
        <h3 class="text-lg font-bold text-slate-950 dark:text-white mb-6 flex items-center">
          <i class="fas fa-shield-halved text-indigo-600 dark:text-violet-400 mr-2.5"></i>
          Change Password
        </h3>

        <form id="securityForm" class="space-y-5">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Current Password</label>
            <input 
              type="password" 
              id="currentPasswordInput" 
              class="block w-full px-3 py-2.5 text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600 dark:focus:ring-violet-500 text-slate-900 dark:text-white transition"
              required
            >
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">New Password</label>
            <input 
              type="password" 
              id="newPasswordInput" 
              class="block w-full px-3 py-2.5 text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600 dark:focus:ring-violet-500 text-slate-900 dark:text-white transition"
              required
            >
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Confirm New Password</label>
            <input 
              type="password" 
              id="confirmNewPasswordInput" 
              class="block w-full px-3 py-2.5 text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600 dark:focus:ring-violet-500 text-slate-900 dark:text-white transition"
              required
            >
          </div>

          <button 
            type="submit" 
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl text-sm font-semibold shadow-lg shadow-indigo-600/20 transition-all flex items-center justify-center hover:scale-[1.01]"
          >
            <i class="fas fa-key mr-2"></i>Update Password
          </button>
        </form>
      </div>

    </div>
  </main>

  <footer class="border-t border-slate-200/50 dark:border-slate-800/30 py-6 text-center text-slate-500 dark:text-slate-400 text-xs mt-12">
    <p>&copy; 2026 SmartSpend. Designed for MCA Professional Project.</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
