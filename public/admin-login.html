<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal Login - SmartSpend</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Icons & Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans transition-colors duration-300">

  <!-- Navbar -->
  <nav class="glass-panel border-b border-slate-800/40 px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center space-x-3">
      <div class="bg-indigo-600 text-white w-9 h-9 rounded-xl flex items-center justify-center shadow-lg">
        <i class="fas fa-shield-halved"></i>
      </div>
      <span class="text-lg font-bold bg-gradient-to-r from-indigo-400 to-violet-300 bg-clip-text text-transparent">
        SmartSpend Admin
      </span>
    </a>
    
    <button class="theme-toggle-btn w-9 h-9 rounded-xl flex items-center justify-center bg-slate-800 hover:bg-slate-700 transition">
      <i class="fas fa-moon text-slate-300"></i>
    </button>
  </nav>

  <!-- Admin Login Form Card -->
  <main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
    <div class="absolute -top-40 -left-40 w-80 h-80 bg-violet-600/10 rounded-full blur-3xl pointer-events-none"></div>
    
    <div class="w-full max-w-md glass-panel p-8 rounded-2xl border border-slate-800/30 shadow-xl z-10 fade-in bg-slate-950/70">
      <div class="text-center mb-8">
        <div class="bg-violet-950/40 text-violet-400 w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-3 border border-violet-900/30">
          <i class="fas fa-lock text-xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-white">System Admin Access</h2>
        <p class="text-sm text-slate-400 mt-1">Authorized administrative personnel only</p>
      </div>

      <form id="adminLoginForm" class="space-y-5">
        <!-- Email Input -->
        <div>
          <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Admin Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
              <i class="fas fa-envelope"></i>
            </div>
            <input 
              type="email" 
              id="email" 
              class="block w-full pl-10 pr-3 py-3 text-sm bg-slate-900 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-500 text-white transition"
              placeholder="admin@smartspend.com" 
              required
            >
          </div>
        </div>

        <!-- Password Input -->
        <div>
          <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Secret Key Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
              <i class="fas fa-key"></i>
            </div>
            <input 
              type="password" 
              id="password" 
              class="block w-full pl-10 pr-10 py-3 text-sm bg-slate-900 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-500 text-white transition"
              placeholder="••••••••" 
              required
            >
            <button 
              type="button" 
              onclick="togglePasswordVisibility('password')"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300"
            >
              <i class="fas fa-eye" id="password-eye"></i>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          data-icon="fa-shield-halved"
          data-text="Authenticate Admin"
          class="w-full bg-violet-600 hover:bg-violet-700 text-white py-3 rounded-xl text-sm font-semibold shadow-lg shadow-violet-600/20 hover:shadow-violet-600/30 transition-all flex items-center justify-center hover:scale-[1.01]"
        >
          <i class="fas fa-shield-halved mr-2"></i>Authenticate Admin
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-500">
        <p>Looking for the user portal? <a href="login.html" class="text-indigo-400 font-semibold hover:underline">User Login</a></p>
      </div>
    </div>
  </main>

  <footer class="border-t border-slate-800/40 py-6 text-center text-slate-600 text-xs">
    <p>&copy; 2026 SmartSpend Admin Panel. Security auditing protocol active.</p>
  </footer>

  <!-- SweetAlert & Form Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function togglePasswordVisibility(fieldId) {
      const input = document.getElementById(fieldId);
      const eye = document.getElementById(`${fieldId}-eye`);
      if (input.type === 'password') {
        input.type = 'text';
        eye.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        eye.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
