<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - SmartSpend</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- Icons & Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col font-sans transition-colors duration-300">

  <!-- Navbar -->
  <nav class="glass-panel border-b border-slate-200/50 dark:border-slate-800/30 px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center space-x-3">
      <div class="bg-indigo-600 text-white w-9 h-9 rounded-xl flex items-center justify-center shadow-lg">
        <i class="fas fa-wallet"></i>
      </div>
      <span class="text-lg font-bold bg-gradient-to-r from-indigo-600 to-violet-500 bg-clip-text text-transparent dark:from-indigo-400 dark:to-violet-300">
        SmartSpend
      </span>
    </a>
    
    <button class="theme-toggle-btn w-9 h-9 rounded-xl flex items-center justify-center bg-slate-100 hover:bg-slate-200 dark:bg-slate-900 dark:hover:bg-slate-800 transition">
      <i class="fas fa-moon"></i>
    </button>
  </nav>

  <!-- Login Form Card -->
  <main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
    <div class="absolute -top-40 -left-40 w-80 h-80 bg-indigo-400/20 dark:bg-indigo-600/10 rounded-full blur-3xl pointer-events-none"></div>
    
    <div class="w-full max-w-md glass-panel p-8 rounded-2xl border border-slate-200/50 dark:border-slate-800/30 shadow-xl z-10 fade-in">
      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Welcome Back</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Sign in to manage your budget and track expenses</p>
      </div>

      <form id="loginForm" class="space-y-5">
        <!-- Email Input -->
        <div>
          <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex.items-center flex items-center pointer-events-none text-slate-400">
              <i class="fas fa-envelope"></i>
            </div>
            <input 
              type="email" 
              id="email" 
              class="block w-full pl-10 pr-3 py-3 text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600 dark:focus:ring-violet-500 text-slate-900 dark:text-white transition"
              placeholder="name@example.com" 
              required
            >
          </div>
        </div>

        <!-- Password Input -->
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Password</label>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fas fa-lock"></i>
            </div>
            <input 
              type="password" 
              id="password" 
              class="block w-full pl-10 pr-10 py-3 text-sm bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-600 dark:focus:ring-violet-500 text-slate-900 dark:text-white transition"
              placeholder="••••••••" 
              required
            >
            <button 
              type="button" 
              onclick="togglePasswordVisibility('password')"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"
            >
              <i class="fas fa-eye" id="password-eye"></i>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          data-icon="fa-sign-in-alt"
          data-text="Sign In"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl text-sm font-semibold shadow-lg shadow-indigo-600/20 hover:shadow-indigo-600/30 transition-all flex items-center justify-center hover:scale-[1.01]"
        >
          <i class="fas fa-sign-in-alt mr-2"></i>Sign In
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400 space-y-2">
        <p>Don't have an account? <a href="register.html" class="text-indigo-600 dark:text-indigo-400 font-semibold hover:underline">Create Account</a></p>
        <p class="text-xs pt-2 border-t border-slate-100 dark:border-slate-800">
          Looking for admin login? <a href="admin-login.html" class="text-indigo-600 dark:text-indigo-400 font-semibold hover:underline">Admin Login</a>
        </p>
      </div>
    </div>
  </main>

  <!-- SweetAlert & Form Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function togglePasswordVisibility(fieldId) {
      const input = document.getElementById(fieldId);
      const eye = document.getElementById(`${fieldId}-eye`);
      if (input.type === 'password') {
        input.type = 'text';
        eye.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        eye.className = 'fas fa-eye';
      }
    }
  </script>
</body>
</html>
